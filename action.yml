name: "Sync Master to Releases"
description: "Merges master into all active release branches with Teams notification on failure"

inputs:
  token:
    description: "GitHub token with push permissions"
    required: true
  fallback_to_develop:
    description: "If no release branch found, merge into develop"
    required: false
    default: "true"
  teams_webhook_url:
    description: "Microsoft Teams webhook URL for failure notifications"
    required: false
    default: ""
  teams_mention_emails:
    description: "Comma-separated emails to mention in Teams on failure"
    required: false
    default: ""
  release_branch_pattern:
    description: "Regex pattern for valid release branches"
    required: false
    default: "^release_([0-9]{4}|[0-9]{8})$"

runs:
  using: "composite"
  steps:
    - name: Clone and merge
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} /tmp/repo
        cd /tmp/repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch --all

        RELEASES=$(git branch -r | sed 's|origin/||' | tr -d ' ' | grep -E '${{ inputs.release_branch_pattern }}' | sort -t'_' -k2)

        if [ -z "$RELEASES" ]; then
          if [ "${{ inputs.fallback_to_develop }}" = "true" ]; then
            echo "No release branch found, falling back to develop"
            git checkout develop || git checkout -b develop
            git merge origin/master --no-edit
            git push origin develop
          else
            echo "No release branch found, skipping"
          fi
        else
          for BRANCH in $RELEASES; do
            echo "Merging master into $BRANCH"
            git checkout "$BRANCH"
            git merge origin/master --no-edit
            git push origin "$BRANCH"
          done
        fi

    - name: Notify Teams on failure
      if: failure() && inputs.teams_webhook_url != ''
      shell: bash
      env:
        TEAMS_MENTION_EMAILS: ${{ inputs.teams_mention_emails }}
      run: |
        REPO="${{ github.repository }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        MENTION_TEXT=""
        MENTION_ENTITIES="[]"
        if [ -n "$TEAMS_MENTION_EMAILS" ]; then
          IFS=',' read -ra EMAILS <<< "$TEAMS_MENTION_EMAILS"
          ENTITIES=""
          for EMAIL in "${EMAILS[@]}"; do
            EMAIL=$(echo "$EMAIL" | xargs)
            NAME="${EMAIL%%@*}"
            MENTION_TEXT="$MENTION_TEXT <at>$NAME</at>"
            ENTITY='{"type":"mention","text":"<at>'"$NAME"'</at>","mentioned":{"id":"'"$EMAIL"'","name":"'"$NAME"'"}}'
            ENTITIES="${ENTITIES:+$ENTITIES,}$ENTITY"
          done
          MENTION_ENTITIES="[$ENTITIES]"
        fi

        cat <<EOF > /tmp/teams-payload.json
        {
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "text": "⚠ Auto-merge failed",
                  "weight": "Bolder",
                  "size": "Medium",
                  "color": "Attention"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Project:", "value": "$REPO" },
                    { "title": "Merge:", "value": "master → release branches" }
                  ]
                },
                {
                  "type": "TextBlock",
                  "text": "Merge conflicts need to be resolved manually.$MENTION_TEXT",
                  "wrap": true
                }
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "View workflow run",
                  "url": "$RUN_URL"
                }
              ],
              "msteams": {
                "entities": $MENTION_ENTITIES
              }
            }
          }]
        }
        EOF

        curl -H "Content-Type: application/json" -d @/tmp/teams-payload.json "${{ inputs.teams_webhook_url }}"
